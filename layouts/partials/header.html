<header class="site-header">
  <div class="site-header-inner">
    <button
      class="menu-toggle"
      type="button"
      aria-expanded="false"
      aria-controls="mobile-menu"
      aria-label="Open menu"
      onclick="toggleMenu()"
    >
      <span class="menu-toggle-bars" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>

    <a class="site-title" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>

    <nav class="desktop-nav" aria-label="Primary">
      <a href="{{ "/topics/" | relURL }}">Topics</a>
      <a href="{{ "/series/" | relURL }}">Series</a>
      <a href="{{ "/recent/" | relURL }}">Recent</a>
      <a href="{{ "/about/" | relURL }}">About</a>
      <a href="{{ "/search/" | relURL }}">Search</a>
    </nav>

    <a class="search-link mobile-search-link" href="{{ "/search/" | relURL }}">Search</a>
  </div>

  <nav id="mobile-menu" class="mobile-menu" aria-label="Mobile">
    <a href="{{ "/" | relURL }}">Home</a>
    <a href="{{ "/topics/" | relURL }}">Topics</a>
    <a href="{{ "/series/" | relURL }}">Series</a>
    <a href="{{ "/recent/" | relURL }}">Recent videos</a>
    <a href="{{ "/about/" | relURL }}">About</a>
    <a href="{{ "/search/" | relURL }}">Search</a>
  </nav>
</header>

<script>
  function toggleMenu() {
    const menu = document.getElementById('mobile-menu');
    const button = document.querySelector('.menu-toggle');
    const isOpen = menu.classList.toggle('is-open');
    button.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  }
</script>
