{{ define "main" }}
<section class="container page-header">
  <p class="eyebrow">{{ .Data.Singular | humanize }}</p>
  <h1>{{ .Title }}</h1>
</section>
<section class="container listing">
  {{ range .Pages }}
    <article class="card">
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      {{ with .Params.summary }}<p>{{ . }}</p>{{ end }}
    </article>
  {{ end }}
</section>
{{ end }}
