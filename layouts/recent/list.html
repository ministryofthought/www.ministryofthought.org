{{ define "main" }}
<section class="hero">
  <div class="kicker smallcaps">Recent</div>
  <h1 class="page-title">{{ .Title }}</h1>
  {{ with .Params.description }}<p class="lead">{{ . }}</p>{{ end }}
</section>
<section class="panel">
  <div class="content-list">
    {{ range partial "primary-content-pages.html" . }}
      {{ partial "primary-content-card.html" (dict "page" .) }}
    {{ end }}
  </div>
</section>
{{ end }}
