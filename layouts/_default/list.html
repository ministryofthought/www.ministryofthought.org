{{ define "main" }}
  <section class="hero">
    <div class="kicker smallcaps">{{ .Section | humanize }}</div>
    <h1 class="page-title">{{ .Title }}</h1>
    {{ with .Content }}<div class="lead">{{ . }}</div>{{ end }}
  </section>
  <section class="panel">
    <div class="content-list">
      {{ range .Pages.ByDate.Reverse }}
        <article>
          <a href="{{ .RelPermalink }}"><strong>{{ .Title }}</strong></a>
          {{ with .Params.summary }}<p>{{ . }}</p>{{ end }}
        </article>
      {{ end }}
    </div>
  </section>
{{ end }}
