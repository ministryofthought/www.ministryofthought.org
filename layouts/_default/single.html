{{ define "main" }}
  <article>
    <section class="hero">
      <div class="kicker smallcaps">{{ .Section | humanize }}</div>
      <h1 class="page-title">{{ .Title }}</h1>
      {{ with .Params.description }}<p class="lead">{{ . }}</p>{{ end }}
    </section>
    <section class="content-block">
      {{ .Content }}
    </section>
  </article>
{{ end }}
