baseURL = "https://www.ministryofthought.org/"
languageCode = "en-gb"
title = "Ministry of Thought"
enableRobotsTXT = true
summaryLength = 24

[pagination]
  pagerSize = 10

[taxonomies]
  topic = "topics"
  series = "series"

[params]
  description = "A structured companion to the videos: references, errata, related topics, and curated pathways through the content."
  googleSiteSearchBase = "https://www.google.com/search?q=site:ministryofthought.org+"
  youtubePrivacyDomain = "https://www.youtube-nocookie.com/embed/"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menus]
  [[menus.main]]
    name = "Topics"
    pageRef = "/topics"
    weight = 10
  [[menus.main]]
    name = "Series"
    pageRef = "/series"
    weight = 20
  [[menus.main]]
    name = "Recent"
    pageRef = "/recent"
    weight = 30
  [[menus.main]]
    name = "About"
    pageRef = "/about"
    weight = 40

[related]
  includeNewer = true
  threshold = 20
  toLower = true

  [[related.indices]]
    name = "topics"
    weight = 100

  [[related.indices]]
    name = "series"
    weight = 60

  [[related.indices]]
    name = "date"
    weight = 10
    pattern = "2006"
